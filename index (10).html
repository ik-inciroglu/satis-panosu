<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>İNCİROĞLU OTOMOTİV — Satış Panosu</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16324e">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Satış Panosu">
<style>
:root{
  --brand:#16324e; --brand-2:#1f456b; --accent:#c9a227; --accent-2:#e0be4f;
  --page:#eef1f4; --surface:#ffffff; --surface-2:#f7f8fa;
  --ink:#0e1b28; --ink-2:#52514e; --muted:#8a8f96; --grid:#e6e8ec; --line:#cfd4da;
  --s-butce:#2a78d6; --s-hedef:#eda100; --s-fiili:#1baf7a;
  --ok:#0ca30c; --warn:#e8930c; --bad:#d03b3b; --serious:#ec835a;
  --radius:12px; --shadow:0 1px 3px rgba(16,27,40,.08),0 8px 24px rgba(16,27,40,.06);
  --font:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
@media (prefers-color-scheme:dark){
 :root{
  --page:#0d0f12; --surface:#181b1f; --surface-2:#202329;
  --ink:#f2f4f7; --ink-2:#c3c2b7; --muted:#9aa0a6; --grid:#2b2f35; --line:#3a3f46;
  --s-butce:#3987e5; --s-hedef:#c98500; --s-fiili:#199e70;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.3);
 }
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{background:var(--page)} /* ilk boyama beyaz değil sayfa renginde olsun (yenileme flaşı) */
body{font-family:var(--font);background:var(--page);color:var(--ink);font-size:14px;line-height:1.45}
/* Oturum devam ederken (yenileme) giriş ekranı HİÇ boyanmasın — flaş kaynağı buydu */
html.resume #login{display:none!important}
button{font-family:inherit;cursor:pointer}
h1,h2,h3,h4{margin:0;font-weight:700}
.hidden{display:none!important}
.tnum{font-variant-numeric:tabular-nums}

/* ---------- LOGIN ---------- */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--brand) 0%,#0d2033 100%);padding:20px}
.login-card{background:var(--surface);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.35);
  width:100%;max-width:390px;overflow:hidden}
.login-head{background:var(--brand);color:#fff;padding:0 0 16px;border-bottom:3px solid var(--accent);line-height:0}
.login-head img{width:100%;display:block;line-height:0}
.login-head .tagline{display:block;line-height:1.4;margin:12px 30px 0;font-size:12.5px;color:#b7c4d2;text-align:center}
.login-budget{margin:14px 30px 0;padding:10px 14px;background:rgba(201,162,39,.14);border:1px solid rgba(201,162,39,.4);
  border-radius:10px;text-align:center;font-size:13px;font-weight:700;color:var(--accent-2);line-height:1.3}
.login-budget b{font-size:17px;display:block;color:#fff;margin-top:1px}
.login-body{padding:24px 30px 28px}
.login-body label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin:14px 0 6px}
.login-body input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;
  font-size:14px;background:var(--surface-2);color:var(--ink)}
.login-body input:focus{outline:2px solid var(--brand-2);border-color:transparent}
.login-body button{width:100%;margin-top:20px;padding:12px;background:var(--brand);color:#fff;
  border:none;border-radius:9px;font-size:15px;font-weight:600}
.login-body button:hover{background:var(--brand-2)}
.login-err{color:var(--bad);font-size:12.5px;margin-top:12px;min-height:16px;font-weight:600}
.login-hint{margin-top:16px;font-size:11.5px;color:var(--muted);text-align:center}

/* ---------- SHELL ---------- */
#app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--brand);color:#fff;display:flex;align-items:center;gap:14px;
  padding:0 20px;height:58px;border-bottom:3px solid var(--accent);position:sticky;top:0;z-index:30}
.topbar .brand{font-weight:700;font-size:16px;letter-spacing:.02em}
.topbar .brand b{color:var(--accent-2)}
.topbar .sub{font-size:12px;color:#b7c4d2;border-left:1px solid #3a5772;padding-left:14px}
.topbar .spacer{flex:1}
.topbar .who{font-size:12.5px;color:#cdd8e3;text-align:right}
.topbar .who b{color:#fff;display:block;font-size:13px}
.topbar .role{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.06em;
  background:var(--accent);color:#2a230a;border-radius:20px;padding:2px 8px;margin-top:2px}
.topbar button.logout{background:#26445f;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:12.5px}
.topbar button.logout:hover{background:#31556f}
.layout{display:flex;flex:1;min-height:0}

/* ---------- SIDEBAR / FILTERS ---------- */
.sidebar{width:270px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--grid);
  padding:16px 14px 40px;overflow-y:auto;max-height:calc(100vh - 58px);position:sticky;top:58px}
.side-title{font-size:11px;letter-spacing:.12em;color:var(--muted);font-weight:700;text-transform:uppercase;
  margin:18px 4px 8px;display:flex;justify-content:space-between;align-items:center}
.side-title:first-child{margin-top:0}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:12px;padding:5px 10px;border:1px solid var(--line);border-radius:20px;background:var(--surface-2);
  color:var(--ink-2);user-select:none}
.chip:hover{border-color:var(--brand-2)}
.chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.chip.q{border-radius:8px;font-weight:600}
.checklist{border:1px solid var(--grid);border-radius:9px;max-height:210px;overflow-y:auto;background:var(--surface-2)}
.checklist label{display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:12.5px;cursor:pointer;border-bottom:1px solid var(--grid)}
.checklist label:last-child{border-bottom:none}
.checklist label:hover{background:var(--page)}
.checklist input{accent-color:var(--brand);width:15px;height:15px}
.searchbox{width:100%;padding:7px 10px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;
  font-size:12.5px;background:var(--surface-2);color:var(--ink)}
.side-actions{display:flex;gap:8px;margin-top:6px}
.btn-sm{font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid var(--line);background:var(--surface-2);color:var(--ink-2)}
.btn-sm:hover{border-color:var(--brand-2);color:var(--ink)}
.mini-link{font-size:11px;color:var(--brand-2);font-weight:600;cursor:pointer}

/* ---------- MAIN ---------- */
.main{flex:1;min-width:0;padding:18px 22px 60px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--grid);margin-bottom:18px;flex-wrap:wrap}
.tab{padding:10px 16px;font-size:13.5px;font-weight:600;color:var(--ink-2);border:none;background:none;
  border-bottom:2.5px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--brand);border-bottom-color:var(--accent)}
.tab .role{font-size:9px}
.filter-summary{font-size:12px;color:var(--muted);margin-bottom:14px}
.filter-summary b{color:var(--ink-2)}

/* KPI cards */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;border-top:3px solid var(--brand)}
.kpi.k-fiili{border-top-color:var(--s-fiili)} .kpi.k-hedef{border-top-color:var(--s-hedef)}
.kpi.k-rank{border-top-color:var(--s-butce)} .kpi.k-oran{border-top-color:var(--accent)}
.kpi .lbl{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700}
.kpi .val{font-size:29px;font-weight:700;margin-top:6px;letter-spacing:-.01em}
.kpi .sub{font-size:11.5px;color:var(--ink-2);margin-top:3px}

/* cards / grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:1000px){.grid2{grid-template-columns:1fr}}
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:16px}
.card h3{font-size:14px;color:var(--ink);margin-bottom:2px}
.card .csub{font-size:11.5px;color:var(--muted);margin-bottom:12px}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin:2px 0 10px}
.legend span{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2)}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block}

/* table */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:8px 10px;text-align:right;border-bottom:1px solid var(--grid);white-space:nowrap}
th:first-child,td:first-child{text-align:left}
th{font-size:11px;letter-spacing:.03em;color:var(--muted);text-transform:uppercase;font-weight:700;cursor:pointer;user-select:none;position:sticky;top:0;background:var(--surface)}
th:hover{color:var(--ink)}
tbody tr:hover{background:var(--surface-2)}
td.name{font-weight:600;color:var(--ink)}
.bar-cell{position:relative}
.bar-cell .fillbar{position:absolute;left:0;top:0;bottom:0;background:var(--s-fiili);opacity:.14;border-radius:0 4px 4px 0}
.badge{display:inline-block;font-weight:700;font-size:11.5px;padding:2px 8px;border-radius:20px;min-width:42px;text-align:center}
.dan-eski{color:var(--bad);font-weight:700}
.dan-eski::after{content:' (Eski)';font-weight:600;font-size:10.5px;opacity:.75}
.b-ok{background:rgba(12,163,12,.14);color:var(--ok)} .b-warn{background:rgba(232,147,12,.16);color:var(--warn)}
.b-bad{background:rgba(208,59,59,.14);color:var(--bad)}
.tablewrap{max-height:560px;overflow:auto;border-radius:10px;border:1px solid var(--grid)}

/* marka analizi accordion */
.marka-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.marka-head{display:grid;grid-template-columns:1.4fr repeat(4,1fr) auto;gap:10px;align-items:center;
  padding:14px 18px;cursor:pointer}
.marka-head:hover{background:var(--surface-2)}
.marka-head .mk{font-size:15px;font-weight:700}
.mk-wrap{display:flex;flex-direction:column;gap:4px;min-width:0}
.mk-top{display:flex;gap:5px;flex-wrap:wrap}
.mk-top .badge{font-size:9.5px;padding:1px 6px}
.mini-gauge{width:92px;max-width:100%;height:5px;background:var(--surface-2);border-radius:3px;overflow:hidden}
.mini-fill{display:block;height:100%;border-radius:3px}
.mini-fill.b-ok{background:var(--ok)} .mini-fill.b-warn{background:var(--warn)} .mini-fill.b-bad{background:var(--bad)}
.marka-head .metric{text-align:right}
.marka-head .metric .m-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.marka-head .metric .m-v{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.marka-head .caret{color:var(--muted);font-size:12px;transition:transform .15s}
.marka-card.open .caret{transform:rotate(90deg)}
.marka-body{padding:0 18px 18px;border-top:1px solid var(--grid)}
@media(max-width:820px){.marka-head{grid-template-columns:1fr auto;row-gap:8px}.marka-head .metric{display:none}}

/* svg chart */
.chart{width:100%;height:auto;display:block;overflow:visible}
.chart text{font-family:var(--font)}
#view{transition:opacity .22s ease, transform .22s ease}
#view.fading{opacity:0;transform:translateY(4px)}
.axis{fill:var(--muted);font-size:12.5px;font-weight:700}
.gridline{stroke:var(--grid);stroke-width:1}
.baseline{stroke:var(--line);stroke-width:1.5}
.vlabel{fill:var(--ink-2);font-size:12.5px;font-weight:800;font-variant-numeric:tabular-nums}
.xlabel{fill:var(--ink);font-size:13.5px;font-weight:700}

/* admin */
.adminwrap{max-width:920px}
.subtabs{display:flex;gap:8px;margin-bottom:16px}
.subtab{padding:8px 14px;border:1px solid var(--line);border-radius:8px;font-size:12.5px;font-weight:600;background:var(--surface);color:var(--ink-2)}
.subtab.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn{padding:10px 16px;background:var(--brand);color:#fff;border:none;border-radius:9px;font-size:13.5px;font-weight:600}
.btn:hover{background:var(--brand-2)}
.btn.gold{background:var(--accent);color:#2a230a}.btn.gold:hover{background:var(--accent-2)}
.btn.ghost{background:var(--surface);color:var(--ink-2);border:1px solid var(--line)}
.note{font-size:12px;color:var(--ink-2);background:var(--surface-2);border-left:3px solid var(--accent);
  padding:10px 14px;border-radius:0 8px 8px 0;margin:12px 0}
.ok-msg{color:var(--ok);font-weight:600;font-size:13px}
.err-msg{color:var(--bad);font-weight:600;font-size:13px}
.formrow{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-bottom:10px}
.formrow .fld{display:flex;flex-direction:column;gap:4px}
.formrow label{font-size:11px;font-weight:600;color:var(--ink-2)}
.formrow input,.formrow select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--surface-2);color:var(--ink)}
.formrow textarea{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--surface-2);color:var(--ink);font-family:inherit;width:100%}

/* karne */
.karnewrap{max-width:1080px}
.karne-head{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:4px}
@media(max-width:800px){.karne-head{grid-template-columns:1fr 1fr}}
.karne-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px}
.karne-table th,.karne-table td{padding:8px 9px;border-bottom:1px solid var(--grid);text-align:center;vertical-align:middle}
.karne-table th{font-size:10.5px;letter-spacing:.02em;color:var(--muted);text-transform:uppercase;font-weight:700;background:var(--surface-2)}
.karne-table td:first-child,.karne-table th:first-child{text-align:left}
.karne-table input,.karne-table select{width:80px;padding:6px 7px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;background:var(--surface-2);color:var(--ink);text-align:center}
.karne-table input[readonly]{background:var(--page);color:var(--ink-2);border-style:dashed}
.karne-table select{width:110px}
.karne-table .metad{font-weight:600;color:var(--ink);max-width:230px;white-space:normal;line-height:1.3}
.karne-table .metad small{display:block;font-weight:400;color:var(--muted);font-size:10.5px;margin-top:2px}
.karne-oran{font-weight:700}
.k-badge{display:inline-block;font-weight:700;font-size:11px;padding:3px 10px;border-radius:20px;white-space:nowrap}
.k-badge.k-taslak{background:rgba(138,143,150,.16);color:var(--muted)}
.k-badge.k-kesin{background:rgba(42,120,214,.14);color:var(--s-butce)}
.k-badge.k-cikti{background:rgba(12,163,12,.14);color:var(--ok)}
.karne-list td{cursor:pointer}
.karne-list tr:hover{background:var(--surface-2)}
.subtab.karne-sub{font-size:12px}

/* karne dashboard */
.karne-dash-filters{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-bottom:16px}

/* sürükle-bırak dışa aktarma */
.dnd-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:760px){.dnd-cols{grid-template-columns:1fr}}
.dnd-box{border:1px solid var(--line);border-radius:10px;background:var(--surface-2);padding:10px;min-height:200px}
.dnd-box h4{font-size:12px;color:var(--ink-2);margin:2px 4px 10px}
.dnd-box.over{border-color:var(--brand-2);background:rgba(31,69,107,.08)}
.dnd-list{list-style:none;margin:0;padding:0;min-height:160px}
.dnd-item{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:8px 12px;margin-bottom:6px;
  font-size:12.5px;font-weight:600;color:var(--ink);cursor:grab;display:flex;align-items:center;gap:8px;user-select:none}
.dnd-item:active{cursor:grabbing}
.dnd-item.dragging{opacity:.35}
.dnd-item .gr{color:var(--muted);font-size:11px}

/* karne listesi (akordeon — seçtikçe açılır) */
.karne-item{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.karne-item-head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 18px;cursor:pointer}
.karne-item-head:hover{background:var(--surface-2)}
.karne-item-head .caret{color:var(--muted);font-size:11px;transition:transform .15s;flex-shrink:0}
.karne-item.open .caret{transform:rotate(90deg)}
.karne-item-body{padding:0 18px 18px;border-top:1px solid var(--grid)}

/* karne hazırlanma durumu matrisi */
.durum-grid{width:100%;border-collapse:collapse;font-size:12px}
.durum-grid th,.durum-grid td{padding:6px 8px;text-align:center;border-bottom:1px solid var(--grid);white-space:nowrap}
.durum-grid th{position:sticky;top:0;background:var(--surface);font-size:10px;text-transform:uppercase;
  color:var(--muted);font-weight:700;letter-spacing:.03em;z-index:2}
.durum-grid th:first-child{text-align:left}
.dg-marka-row td{background:var(--surface-2);font-weight:700;color:var(--brand-2);text-align:left;font-size:12.5px}
.dg-dan{text-align:left;color:var(--ink-2);font-weight:600;padding-left:22px}
.dg-cell span{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;
  border-radius:6px;font-size:12px;font-weight:700}
.dg-cell.dg-yok span{color:var(--muted)}
.dg-cell.dg-taslak span{background:rgba(232,147,12,.16);color:var(--warn)}
.dg-cell.dg-kesin span{background:rgba(12,163,12,.16);color:var(--ok)}
.karne-legend{display:flex;gap:16px;flex-wrap:wrap;margin:8px 0 14px;font-size:11.5px;color:var(--ink-2)}
.karne-legend>span{display:inline-flex;align-items:center;gap:6px}

/* tooltip */
#tt{position:fixed;pointer-events:none;background:var(--ink);color:#fff;font-size:11.5px;padding:7px 10px;
  border-radius:7px;box-shadow:0 6px 18px rgba(0,0,0,.3);z-index:100;opacity:0;transition:opacity .08s;max-width:240px}
#tt b{color:var(--accent-2)}
.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px}

/* excel bağlantı çipi + toast */
.xlchip{display:flex;align-items:center;gap:7px;background:#26445f;color:#dbe6ef;border:none;
  border-radius:20px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.xlchip:hover{background:#31556f}
.xlchip .dot{width:8px;height:8px;border-radius:50%;background:#8a8f96;flex-shrink:0}
.xlchip.on .dot{background:#37d67a}
.xlchip.warn .dot{background:#fab219}
#toast{position:fixed;right:18px;bottom:18px;background:var(--ink);color:var(--surface);
  padding:10px 16px;border-radius:9px;font-size:12.5px;font-weight:600;
  box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:opacity .25s;z-index:120;pointer-events:none}
/* ---------- MOBİL ---------- */
.menuBtn{display:none;background:#26445f;color:#fff;border:none;border-radius:8px;
  padding:8px 12px;font-size:16px;cursor:pointer}
@media(max-width:800px){
  .menuBtn{display:block}
  .sidebar{position:fixed;left:0;top:58px;bottom:0;z-index:45;width:282px;max-height:none;
    transform:translateX(-105%);transition:transform .22s;box-shadow:0 0 40px rgba(0,0,0,.35)}
  .sidebar.open{transform:none}
  .topbar{gap:8px;padding:0 10px}
  .topbar .sub{display:none}
  .topbar .brand{font-size:13px}
  .topbar .who{display:none}
  .main{padding:12px 10px 60px}
  .kpis{grid-template-columns:repeat(2,1fr);gap:10px}
  .kpi .val{font-size:23px}
  .tabs{overflow-x:auto;flex-wrap:nowrap}
  .tab{white-space:nowrap;padding:10px 11px}
}

/* ---------- YAZDIRMA ---------- */
@media print{
  .topbar,.sidebar,.tabs,.filter-summary,.no-print,#toast,#tt{display:none!important}
  .main{padding:0}
  body{background:#fff}
  .card{box-shadow:none;border:1px solid #ddd;page-break-inside:avoid}
}
</style>
</head>
<body>
<script>
/* ERKEN: oturum sürüyorsa giriş ekranını daha çizilmeden gizle (yenileme flaşını önler) */
try{if(sessionStorage.getItem('sp_ses'))document.documentElement.classList.add('resume');}catch(e){}

function fmtPct(n){return (n==null||!isFinite(n))?'–':(n*100).toFixed(0)+'%';}

function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function trLower(s){return s.replace(/İ/g,'i').replace(/I/g,'ı').toLocaleLowerCase('tr');}
function trTitle(name){return String(name).trim().split(/\s+/).map(function(w){
  if(!w)return'';var wl=trLower(w);var f=wl[0]; f=(f==='i')?'İ':(f==='ı')?'I':f.toLocaleUpperCase('tr');
  return f+wl.slice(1);}).join(' ');}
function statusOf(pct){if(pct==null||!isFinite(pct))return['b-warn','–'];
  if(pct>=1)return['b-ok',fmtPct(pct)];if(pct>=0.8)return['b-warn',fmtPct(pct)];return['b-bad',fmtPct(pct)];}

function buildDims(){
  var f=VERI.facts||[];
  DIM.markalar=[...new Set(f.map(x=>x.marka))].sort((a,b)=>a.localeCompare(b,'tr'));
  DIM.danismanlar=[...new Set(f.map(x=>x.danisman))].sort((a,b)=>a.localeCompare(b,'tr'));
  DIM.yillar=[...new Set(f.map(x=>x.yil))].sort();
  DIM.aylar=[...new Set(f.map(x=>x.ay))].sort((a,b)=>a-b);
}
function resetFilters(){
  // "Boş seçim = kısıt yok" kuralı TÜM boyutlar için geçerli: sıfırla → hiçbir
  // şey seçili değil (çipler sönük, kutular boş) ama tüm veri akar.
  FLT.markalar=new Set();FLT.danismanlar=new Set();
  FLT.aylar=new Set();FLT.yillar=new Set();danSearch='';selDan=null;
}
/* Açılış varsayılanı: tüm dönem (toplam) seçili gelir; kullanıcı sonrasında
   dilediği ay/yıl/marka/danışmanı seçerek filtreler. */
function varsayilanDonemSec(){
  // Kasıtlı olarak boş bırakılıyor: FLT.aylar/FLT.yillar boş = "kısıt yok" = tüm veri.
}
/* Seçili aylar; hiç ay seçili değilse tüm aylar (kısıt yok). Grafik/tablolarda kullanılır. */
function aktifAylar(){
  var a=FLT.aylar.size?[...FLT.aylar]:[...DIM.aylar];
  return a.sort(function(x,y){return x-y;});
}

/* ==================== FİLTRE / AGREGASYON ==================== */
function filtered(){
  // Boş seçim = kısıt yok. Marka için: hiç marka seçili değilse tüm markalar.
  // Danışman için: kısıt yalnızca SEÇİLİ MARKALARDA işaretli danışman varsa uygulanır;
  // yoksa (hiç işaret yok ya da işaretliler başka markadan) markanın tüm verisi akar.
  var facts=VERI.facts||[];
  var mOk=function(x){return !FLT.markalar.size||FLT.markalar.has(x.marka);};
  var effDan=new Set();
  facts.forEach(function(x){if(mOk(x)&&FLT.danismanlar.has(x.danisman))effDan.add(x.danisman);});
  return facts.filter(function(x){return (!FLT.yillar.size||FLT.yillar.has(x.yil))
    &&(!FLT.aylar.size||FLT.aylar.has(x.ay))
    &&mOk(x)&&(!effDan.size||effDan.has(x.danisman));});
}
function butceToplam(markaSet,aySet){
  var t=0,bu=VERI.butce||{};
  markaSet.forEach(function(m){var arr=bu[m];if(arr)aySet.forEach(function(ay){t+=arr[ay-1]||0;});});
  return t;
}
function aggBy(rows,key){
  var m={};rows.forEach(function(r){var k=r[key];if(!m[k])m[k]={hedef:0,fiili:0,filo:0,markalar:new Set()};
    m[k].hedef+=r.hedef;m[k].fiili+=r.fiili;m[k].filo+=(r.filo||0);m[k].markalar.add(r.marka);});return m;}
var DAN_DURUM=null;
function danDurum(d){
  if(!DAN_DURUM){DAN_DURUM={};(VERI.facts||[]).forEach(function(r){if(r.danisman&&!DAN_DURUM[r.danisman])DAN_DURUM[r.danisman]=r.durum||'Aktif';});}
  return DAN_DURUM[d]||'Aktif';
}
function danAd(d){
  var eski=danDurum(d)==='Eski';
  return eski?'<span class="dan-eski" data-tip="İşten ayrıldı (Eski personel)">'+esc(d)+'</span>':esc(d);
}


/* ==================== SVG GRAFİKLER ==================== */
function groupedBar(cats,series,opts){
  opts=opts||{};var W=opts.w||720,H=opts.h||300,pl=52,pr=12,pt=opts.topLabels?36:16,pb=opts.pb||78;
  var iw=W-pl-pr, ih=H-pt-pb;
  var max=0;series.forEach(s=>s.values.forEach(v=>{if(v>max)max=v;}));max=max||1;
  var ticks=niceTicks(max,4);max=ticks[ticks.length-1];
  var g='';
  ticks.forEach(function(t){var y=pt+ih-ih*(t/max);
    g+='<line class="gridline" x1="'+pl+'" y1="'+y+'" x2="'+(W-pr)+'" y2="'+y+'"/>';
    g+='<text class="axis" x="'+(pl-8)+'" y="'+(y+4)+'" text-anchor="end">'+fmtInt(t)+'</text>';});
  var n=cats.length, gw=iw/n, bw=Math.min(gw/(series.length+0.6),46);
  cats.forEach(function(c,ci){
    var gx=pl+gw*ci, cx=gx+gw/2, totalW=bw*series.length, minY=pt+ih;
    series.forEach(function(s,si){
      var v=s.values[ci]||0, bh=ih*(v/max), x=cx-totalW/2+si*bw, y=pt+ih-bh;
      if(y<minY)minY=y;
      g+='<rect x="'+(x+1)+'" y="'+y+'" width="'+(bw-2)+'" height="'+Math.max(bh,0)+'" rx="3" fill="'+s.color+'" '
        +'data-tip="'+esc(c)+' — '+esc(s.name)+': <b>'+fmtInt(v)+'</b>"></rect>';
      if(opts.labels!==false&&bw>=16)g+='<text class="vlabel" x="'+(x+bw/2)+'" y="'+(y-4)+'" text-anchor="middle">'+fmtInt(v)+'</text>';
    });
    if(opts.topLabels&&opts.topLabels[ci]){
      var tl=opts.topLabels[ci];
      g+='<text x="'+cx+'" y="'+Math.max(minY-19,13)+'" text-anchor="middle" style="font-size:13px;font-weight:800;fill:'+tl.color+'">'+esc(tl.text)+'</text>';
    }
    var rotate=opts.rotate!==false;
    g+='<text class="xlabel" x="'+cx+'" y="'+(pt+ih+18)+'" text-anchor="'+(rotate?'end':'middle')+'"'
      +(rotate?' transform="rotate(-45 '+cx+' '+(pt+ih+18)+')"':'')+'>'+esc(c)+'</text>';
  });
  g+='<line class="baseline" x1="'+pl+'" y1="'+(pt+ih)+'" x2="'+(W-pr)+'" y2="'+(pt+ih)+'"/>';
  return '<svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+g+'</svg>';
}
function lineChart(cats,series,opts){
  opts=opts||{};var W=opts.w||720,H=opts.h||280,pl=52,pr=16,pt=opts.pt||34,pb=46;
  var iw=W-pl-pr, ih=H-pt-pb;
  var max=0;series.forEach(s=>s.values.forEach(v=>{if(v>max)max=v;}));max=max||1;
  var ticks=niceTicks(max,4);max=ticks[ticks.length-1];
  var n=cats.length, step=n>1?iw/(n-1):0, g='';
  ticks.forEach(function(t){var y=pt+ih-ih*(t/max);
    g+='<line class="gridline" x1="'+pl+'" y1="'+y+'" x2="'+(W-pr)+'" y2="'+y+'"/>';
    g+='<text class="axis" x="'+(pl-6)+'" y="'+(y+3)+'" text-anchor="end">'+fmtInt(t)+'</text>';});
  cats.forEach(function(c,ci){var x=pl+step*ci;
    g+='<text class="xlabel" x="'+x+'" y="'+(pt+ih+16)+'" text-anchor="middle">'+esc(c)+'</text>';});
  series.forEach(function(s){
    var pts=s.values.map((v,i)=>[pl+step*i,pt+ih-ih*(v/max)]);
    g+='<polyline fill="none" stroke="'+s.color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" points="'
      +pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')+'"/>';
    pts.forEach(function(p,i){g+='<circle cx="'+p[0]+'" cy="'+p[1]+'" r="4" fill="'+s.color+'" stroke="var(--surface)" stroke-width="2" '
      +'data-tip="'+esc(cats[i])+' — '+esc(s.name)+': <b>'+fmtInt(s.values[i])+'</b>"></circle>';
      if(opts.labels!==false)g+='<text x="'+p[0]+'" y="'+(p[1]-9)+'" text-anchor="middle" class="vlabel" style="fill:'+s.color+'">'+fmtInt(s.values[i])+'</text>';
    });
  });
  g+='<line class="baseline" x1="'+pl+'" y1="'+(pt+ih)+'" x2="'+(W-pr)+'" y2="'+(pt+ih)+'"/>';
  return '<svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+g+'</svg>';
}
function niceTicks(max,count){
  var raw=max/count, mag=Math.pow(10,Math.floor(Math.log10(raw))), norm=raw/mag;
  var step=(norm<1.5?1:norm<3?2:norm<7?5:10)*mag;
  var ticks=[];for(var t=0;t<=max+step*0.001;t+=step)ticks.push(Math.round(t*100)/100);
  if(ticks[ticks.length-1]<max)ticks.push(ticks[ticks.length-1]+step);
  return ticks;
}
function donutChart(segments,opts){
  opts=opts||{};var W=opts.w||220,H=opts.h||220,cx=W/2,cy=H/2,r=Math.min(W,H)/2-8,rInner=r*0.6;
  var total=segments.reduce(function(s,x){return s+x.value;},0)||1;
  var g='',ang=-Math.PI/2;
  segments.forEach(function(s){
    if(!s.value){return;}
    var frac=s.value/total, a1=ang, a2=ang+frac*Math.PI*2, large=(a2-a1)>Math.PI?1:0;
    var x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    var xi1=cx+rInner*Math.cos(a2),yi1=cy+rInner*Math.sin(a2),xi2=cx+rInner*Math.cos(a1),yi2=cy+rInner*Math.sin(a1);
    g+='<path d="M'+x1.toFixed(2)+' '+y1.toFixed(2)+' A'+r+' '+r+' 0 '+large+' 1 '+x2.toFixed(2)+' '+y2.toFixed(2)
      +' L'+xi1.toFixed(2)+' '+yi1.toFixed(2)+' A'+rInner+' '+rInner+' 0 '+large+' 0 '+xi2.toFixed(2)+' '+yi2.toFixed(2)+' Z" '
      +'fill="'+s.color+'" data-tip="'+esc(s.name)+': <b>'+fmtInt(s.value)+'</b> ('+Math.round(frac*100)+'%)"></path>';
    ang=a2;
  });
  g+='<text x="'+cx+'" y="'+(cy-2)+'" text-anchor="middle" class="tnum" style="font-size:22px;font-weight:700;fill:var(--ink)">'+fmtInt(total)+'</text>';
  g+='<text x="'+cx+'" y="'+(cy+15)+'" text-anchor="middle" style="font-size:10.5px;fill:var(--muted)">danışman</text>';
  return '<svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+g+'</svg>';
}
function legend(items){return '<div class="legend">'+items.map(i=>
  '<span><i style="background:'+i.color+'"></i>'+esc(i.name)+'</span>').join('')+'</div>';}

/* ==================== SIDEBAR ==================== */
function renderSidebar(){
  var s=document.getElementById('sidebar');
  var monChips=DIM.aylar.map(a=>'<span class="chip'+(FLT.aylar.has(a)?' on':'')+'" data-ay="'+a+'">'+AYLAR[a-1]+'</span>').join('');
  var qButtons='';[1,2,3,4].forEach(function(q){
    var ays=CEYREKAY[q].filter(a=>DIM.aylar.includes(a));if(!ays.length)return;
    var qOn=FLT.aylar.size===ays.length&&ays.every(a=>FLT.aylar.has(a));
    qButtons+='<span class="chip q'+(qOn?' on':'')+'" data-q="'+q+'">Ç'+q+'</span>';});
  /* "Tümü" yalnızca tüm aylar GERÇEKTEN işaretliyken yanar; sıfırla sonrası sönük */
  var tumuOn=DIM.aylar.length>0&&FLT.aylar.size===DIM.aylar.length;
  qButtons+='<span class="chip q'+(tumuOn?' on':'')+'" data-q="ytd">Tümü</span>';
  var yilChips=DIM.yillar.map(y=>'<span class="chip'+(FLT.yillar.has(y)?' on':'')+'" data-yil="'+y+'">'+y+'</span>').join('');
  var markaList=DIM.markalar.map(m=>'<label><input type="checkbox" data-marka="'+esc(m)+'"'+(FLT.markalar.has(m)?' checked':'')+'>'+esc(m)+'</label>').join('');
  // Marka seçiliyse yalnızca o markalara ait danışmanlar; hiç marka seçili
  // değilse TÜM danışmanlar listelenir (marka seçmeden danışman seçilebilsin).
  var markaDan=new Set((VERI.facts||[]).filter(x=>FLT.markalar.has(x.marka)).map(x=>x.danisman));
  var visibleDan=FLT.markalar.size?DIM.danismanlar.filter(d=>markaDan.has(d)):DIM.danismanlar.slice();
  var dl=visibleDan.filter(d=>!danSearch||trLower(d).includes(trLower(danSearch)));
  var danList=dl.length
    ? dl.map(d=>'<label><input type="checkbox" data-dan="'+esc(d)+'"'+(FLT.danismanlar.has(d)?' checked':'')+'>'+danAd(d)+'</label>').join('')
    : '<label style="color:var(--muted);cursor:default">Seçili markada danışman yok</label>';
  s.innerHTML=
    '<div class="side-title">Dönem</div>'
    +'<div class="chips" style="margin-bottom:8px">'+qButtons+'</div>'
    +'<div class="chips">'+monChips+'</div>'
    +(DIM.yillar.length>1?'<div class="side-title">Yıl</div><div class="chips">'+yilChips+'</div>':'')
    +'<div class="side-title">Marka <span class="mini-link" id="mkAll">Tümü/Hiç</span></div>'
    +'<div class="checklist">'+markaList+'</div>'
    +'<div class="side-title">Danışman ('+visibleDan.length+') <span class="mini-link" id="dnAll">Tümü/Hiç</span></div>'
    +'<input class="searchbox" id="danSearch" placeholder="Danışman ara…" value="'+esc(danSearch)+'">'
    +'<div class="checklist">'+danList+'</div>'
    +'<div class="side-actions"><button class="btn-sm" id="resetFlt">↺ Filtreleri sıfırla</button></div>';

  s.querySelectorAll('[data-ay]').forEach(c=>c.onclick=()=>{var a=+c.dataset.ay;FLT.aylar.has(a)?FLT.aylar.delete(a):FLT.aylar.add(a);sideRefresh();});
  s.querySelectorAll('[data-q]').forEach(c=>c.onclick=()=>{var q=c.dataset.q;
    if(q==='ytd'){
      /* Tümü = her şeyi görünür biçimde seç: bütün aylar, markalar, danışmanlar */
      FLT.aylar=new Set(DIM.aylar);FLT.markalar=new Set(DIM.markalar);
      FLT.danismanlar=new Set(DIM.danismanlar);FLT.yillar=new Set(DIM.yillar);
      sideRefresh();toast('✓ Tümü seçildi — bütün markalar, danışmanlar ve aylar');
    }
    else{FLT.aylar=new Set(CEYREKAY[+q].filter(a=>DIM.aylar.includes(a)));sideRefresh();}});
  s.querySelectorAll('[data-yil]').forEach(c=>c.onclick=()=>{var y=+c.dataset.yil;FLT.yillar.has(y)?FLT.yillar.delete(y):FLT.yillar.add(y);sideRefresh();});
  s.querySelectorAll('[data-marka]').forEach(c=>c.onchange=()=>{var m=c.dataset.marka;c.checked?FLT.markalar.add(m):FLT.markalar.delete(m);sideRefresh();});
  s.querySelectorAll('[data-dan]').forEach(c=>c.onchange=()=>{var d=c.dataset.dan;c.checked?FLT.danismanlar.add(d):FLT.danismanlar.delete(d);render();});
  var ds=document.getElementById('danSearch');if(ds)ds.oninput=()=>{danSearch=ds.value;var p=ds.selectionStart;renderSidebar();var n=document.getElementById('danSearch');if(n){n.focus();n.setSelectionRange(p,p);}};
  document.getElementById('mkAll').onclick=()=>{FLT.markalar=new Set(FLT.markalar.size===DIM.markalar.length?[]:DIM.markalar);sideRefresh();};
  var dnA=document.getElementById('dnAll');
  if(dnA)dnA.onclick=()=>{var allSel=visibleDan.length&&visibleDan.every(d=>FLT.danismanlar.has(d));
    if(allSel)visibleDan.forEach(d=>FLT.danismanlar.delete(d));else visibleDan.forEach(d=>FLT.danismanlar.add(d));sideRefresh();};
  document.getElementById('resetFlt').onclick=()=>{resetFilters();sideRefresh();toast('✓ Filtreler sıfırlandı — tüm veri gösteriliyor');};
}
function sideRefresh(){renderSidebar();render();}

/* ==================== TABS ==================== */
function buildTabs(){
  var tabs;
  if(SES.rol==='mudur'){
    // Marka müdürü yalnızca kendi yetki alanı olan Karne ekranını görür.
    tabs=[['karne','Karne']];
  }else{
    tabs=[['genel','Genel Bakış'],['marka','Marka Analizi'],
        ['danisman','Danışman Analizi'],['veri','Veri']];
    if(SES.rol==='admin'){tabs.push(['karne','Karne']);tabs.push(['yonetim','Yönetim ⚙']);}
  }
  document.getElementById('tabs').innerHTML=tabs.map(t=>
    '<button class="tab'+(TAB===t[0]?' on':'')+'" data-tab="'+t[0]+'">'+t[1]+'</button>').join('');
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{TAB=b.dataset.tab;buildTabs();render();});
  var sb=document.getElementById('sidebar');if(sb)sb.style.display=(TAB==='karne')?'none':'';
}

/* ==================== RENDER ==================== */
function render(){
  var rows=filtered();
  var effMarkalar=new Set(rows.map(r=>r.marka));
  var summary=(TAB==='karne'||TAB==='yonetim')?'':'<b>'+aktifAylar().length+'</b> ay · <b>'+effMarkalar.size+'</b> marka · <b>'
    +new Set(rows.map(r=>r.danisman)).size+'</b> danışman · <b>'+rows.length+'</b> kayıt seçili';
  document.getElementById('filterSummary').innerHTML=summary;
  var v=document.getElementById('view');
  v.classList.add('fading');
  setTimeout(function(){
    if(!rows.length&&TAB!=='yonetim'&&TAB!=='karne'){v.innerHTML='<div class="empty">Seçili filtrelerle veri yok. Soldan filtreleri genişletin.</div>';}
    else if(TAB==='genel')v.innerHTML=viewGenel(rows,effMarkalar);
    else if(TAB==='marka')v.innerHTML=viewMarka(rows);
    else if(TAB==='danisman')v.innerHTML=viewDanisman(rows);
    else if(TAB==='veri')v.innerHTML=viewVeri(rows);
    else if(TAB==='karne')v.innerHTML=viewKarne();
    else if(TAB==='yonetim')v.innerHTML=viewYonetim();

function viewGenel(rows,effMarkalar){

   +kpiCard('k-oran','Gerçekleşme %',fmtPct(oran),'Fiili / İç Hedef (filo hariç)')

    {name:'İç Hedef',color:'var(--s-hedef)',values:ays.map(a=>rows.filter(r=>r.ay===a).reduce((s,r)=>s+r.hedef,0))},
    {name:'Fiili',color:'var(--s-fiili)',values:ays.map(a=>rows.filter(r=>r.ay===a).reduce((s,r)=>s+r.fiili,0))},
    {name:'Bütçe',color:'var(--s-butce)',values:ays.map(a=>butceToplam(effMarkalarNF,new Set([a])))}
  ],{h:280,w:1500});
  // aylık hedef tutturan / tutturamayan danışman sayısı
  var tutS=[], notS=[];

    var byDanA=aggBy(rows.filter(r=>r.ay===a),'danisman'), t=0,nt=0;
    Object.keys(byDanA).forEach(function(k){
      var d=byDanA[k]; if(!d.hedef)return;
      if(d.fiili>=d.hedef)t++; else nt++;
    });
    tutS.push(t); notS.push(nt);
  });
  var tutChart=lineChart(ays.map(a=>AYLAR[a-1].slice(0,3)),[

    var qr=rowsNF.filter(r=>ceyrekOf(r.ay)===q);if(!qr.length)return;
    var qh=qr.reduce((s,r)=>s+r.hedef,0),qf=qr.reduce((s,r)=>s+r.fiili,0),st=statusOf(qh?qf/qh:null);

  // unvan bazında karşılaştırma

  // hedef tutturma durum dağılımı (donut)

  var donut=donutChart([
    {name:'Hedefi Tuttu',value:okC,color:'var(--ok)'},
    {name:'Hedefe Yakın (≥%80)',value:warnC,color:'var(--warn)'},
    {name:'Hedefin Altında',value:badC,color:'var(--bad)'},

      +legend([{name:'İç Hedef',color:'var(--s-hedef)'},{name:'Fiili',color:'var(--s-fiili)'},{name:'Bütçe',color:'var(--s-butce)'}])+mkChart+'</div>'

        +'<span><i style="background:var(--bad)"></i>Hedefin Altında ('+badC+')</span>'
        +(noC?'<span><i style="background:var(--muted)"></i>Hedefi Yok ('+noC+')</span>':'')
      +'</div></div></div>'
    +'<div class="card"><h3>Unvan Bazında İç Hedef vs Fiili</h3><div class="csub">Seçili döneme göre, fiiliye göre sıralı</div>'
      +legend([{name:'İç Hedef',color:'var(--s-hedef)'},{name:'Fiili',color:'var(--s-fiili)'}])+uChart+'</div>'
    +'</div>'
    +'<div class="card"><h3>Aylık Hedef Tutturan / Tutturamayan Danışman Sayısı</h3><div class="csub">Hedefi olan danışmanlar arasında, seçili aylara göre</div>'

    +'<div class="card" style="max-width:520px"><h3>Çeyreklik Özet</h3><div class="csub">Seçili filtreler için (filo hariç)</div>'
      +'<table><thead><tr><th>Çeyrek</th><th>İç Hedef</th><th>Fiili</th><th>Gerç.</th></tr></thead><tbody>'+(ceyRows||'<tr><td colspan="4" class="empty">—</td></tr>')+'</tbody></table></div>';
}
function kpiCard(cls,lbl,val,sub){return '<div class="kpi '+cls+'"><div class="lbl">'+lbl+'</div><div class="val tnum">'+val+'</div><div class="sub">'+esc(sub)+'</div></div>';}

    return {dan:k,marka:[...d.markalar].join(', '),hedef:d.hedef,fiili:d.fiili,oran:oran==null?-1:oran,tut:tut};

      +'<td class="tnum">'+fmtInt(x.hedef)+'</td><td class="tnum bar-cell"><span class="fillbar" style="width:'+(x.fiili/mx*100)+'%"></span>'+fmtInt(x.fiili)+'</td>'

    +'</tr></thead><tbody>'+rowsHtml+'</tbody></table></div></div>'

/* ==================== VERİ SAĞLIĞI (admin) ==================== */
function veriSagligi(){
  var f=VERI.facts||[];
  var grup={},dups=[];
  f.forEach(function(r){var k=r.yil+'|'+r.ay+'|'+r.marka+'|'+r.danisman;(grup[k]=grup[k]||[]).push(r);});
  Object.keys(grup).forEach(function(k){if(grup[k].length>1)dups.push({k:k,adet:grup[k].length,r:grup[k][0]});});
  var suphe=f.filter(function(r){return r.hedef<0||r.fiili<0||(r.hedef===0&&r.fiili>0)||(r.hedef>0&&r.fiili>r.hedef*5);});
  var ciftler={},gaps=[];
  f.forEach(function(r){var k=r.yil+'|'+r.marka+'|'+r.danisman;(ciftler[k]=ciftler[k]||new Set()).add(r.ay);});
  Object.keys(ciftler).forEach(function(k){
    var s=[...ciftler[k]].sort(function(a,b){return a-b;}),eksik=[];
    for(var a=s[0];a<=s[s.length-1];a++)if(!ciftler[k].has(a))eksik.push(AYLAR[a-1]);
    if(eksik.length){var p=k.split('|');gaps.push({yil:p[0],marka:p[1],dan:p[2],eksik:eksik});}});
  return {dups:dups,suphe:suphe,gaps:gaps};
}

  var s=veriSagligi();
  var temiz=!s.dups.length&&!s.suphe.length&&!s.gaps.length;

    +'<div class="csub">Excel DATA sayfasındaki '+(VERI.facts||[]).length+' kayıt tarandı</div>';
  if(temiz)return out+'<div class="ok-msg" style="font-size:15px;padding:16px 0">✓ Veri temiz — mükerrer kayıt, şüpheli değer veya ay boşluğu bulunmadı.</div></div>';

    out+='<h4 style="margin:14px 0 6px;color:var(--bad)">Mükerrer kayıt ('+s.dups.length+')</h4>'

      +'<table><thead><tr><th>Yıl</th><th>Ay</th><th>Marka</th><th style="text-align:left">Danışman</th><th>Satır sayısı</th></tr></thead><tbody>'
      +s.dups.map(function(x){return '<tr><td>'+x.r.yil+'</td><td>'+esc(AYLAR[x.r.ay-1])+'</td><td class="name">'+esc(x.r.marka)
        +'</td><td style="text-align:left">'+esc(x.r.danisman)+'</td><td class="tnum" style="color:var(--bad);font-weight:700">'+x.adet+'</td></tr>';}).join('')
      +'</tbody></table>';

  if(s.suphe.length){
    out+='<h4 style="margin:14px 0 6px;color:var(--warn)">Şüpheli değer ('+s.suphe.length+')</h4>'
      +'<div class="note">Negatif değer, hedefsiz fiili ya da hedefin 5 katından fazla fiili.</div>'
      +'<table><thead><tr><th>Yıl</th><th>Ay</th><th>Marka</th><th style="text-align:left">Danışman</th><th>Hedef</th><th>Fiili</th></tr></thead><tbody>'
      +s.suphe.map(function(r){return '<tr><td>'+r.yil+'</td><td>'+esc(AYLAR[r.ay-1])+'</td><td class="name">'+esc(r.marka)
        +'</td><td style="text-align:left">'+esc(r.danisman)+'</td><td class="tnum">'+r.hedef+'</td><td class="tnum">'+r.fiili+'</td></tr>';}).join('')
      +'</tbody></table>';
  }
  if(s.gaps.length){
    out+='<h4 style="margin:14px 0 6px;color:var(--ink-2)">Ay boşluğu ('+s.gaps.length+') <span style="font-weight:400;font-size:11px;color:var(--muted)">bilgi amaçlı</span></h4>'
      +'<div class="note">Danışmanın ilk ve son veri ayı arasında veri girilmemiş aylar (işten ayrılma/başlama olabilir).</div>'
      +'<table><thead><tr><th>Marka</th><th style="text-align:left">Danışman</th><th style="text-align:left">Eksik aylar</th></tr></thead><tbody>'
      +s.gaps.map(function(x){return '<tr><td class="name">'+esc(x.marka)+'</td><td style="text-align:left">'+esc(x.dan)
        +'</td><td style="text-align:left">'+esc(x.eksik.join(', '))+'</td></tr>';}).join('')
      +'</tbody></table>';
  }
  return out+'</div>';
}

function fmtTarih(iso){
  if(!iso)return '—';
  var d=new Date(iso); if(isNaN(d))return '—';
  return d.toLocaleDateString('tr-TR')+' '+d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
}
function karneById(id){return (WORK.karneler||[]).find(x=>x.id===id)||null;}
/* Karneleri bu tarayıcıda kalıcı tut (localStorage) — hiçbir kullanıcı eylemi
   dosya seçtirme penceresi açmasın diye ana kayıt yolu budur. */
function karneSaveLocal(){try{localStorage.setItem('sp_karneler',JSON.stringify(WORK.karneler||[]));}catch(_){}}
function karneRoster(marka){
  var set=new Set();
  (WORK.facts||[]).forEach(function(f){
    if(f.marka===marka&&f.durum==='Aktif'&&(f.unvan==='Satış Danışmanı'||f.unvan==='Kıdemli Satış Danışmanı'))set.add(f.danisman);
  });
  return [...set].sort((a,b)=>a.localeCompare(b,'tr'));
}
function karneFact(marka,danisman,yil,ay){
  return (WORK.facts||[]).find(f=>f.marka===marka&&f.danisman===danisman&&f.yil===yil&&f.ay===ay)||null;
}
function karneSubeOrt(marka,yil,ay,haric){
  var vals=(WORK.facts||[]).filter(f=>f.marka===marka&&f.yil===yil&&f.ay===ay&&f.danisman!==haric
    &&(f.unvan==='Satış Danışmanı'||f.unvan==='Kıdemli Satış Danışmanı')).map(f=>f.fiili);
  if(!vals.length)return null;
  return Math.round((vals.reduce((s,v)=>s+v,0)/vals.length)*10)/10;
}
function karneBul(yil,ay,marka,danisman){
  return (WORK.karneler||[]).find(k=>k.yil===yil&&k.ay===ay&&k.marka===marka&&k.danisman===danisman)||null;
}
function karneOranHesap(hedef,gerceklesen){
  if(hedef==null||hedef===''||+hedef===0||gerceklesen==null||gerceklesen==='')return null;
  return (+gerceklesen)/(+hedef);
}
function karneDurumOner(oran){return oran==null?'':(oran>=1?'Başarılı':'Yetersiz');}
function karneDefaultRows(marka,yil,ay,dan){
  var f=karneFact(marka,dan,yil,ay);
  var acHedef=f?f.hedef:null, acGerc=f?f.fiili:null, acOrt=karneSubeOrt(marka,yil,ay,dan);
  var takasHedef=(acHedef!=null)?Math.round(acHedef*0.15*10)/10:null;
  return KARNE_METRIKLER.map(function(m){
    if(m.key==='arac_satis')return {key:m.key,hedef:acHedef,gerceklesen:acGerc,subeOrt:acOrt,durum:karneDurumOner(karneOranHesap(acHedef,acGerc))};
    if(m.tip==='ozel')return {key:m.key,hedef:null,gerceklesen:null,subeOrt:null,durum:''};
    return {key:m.key,hedef:(m.key==='takas'?takasHedef:null),gerceklesen:null,subeOrt:null,durum:''};
  });
}
function karneTableHtml(rows,kilitli,isNew){

        +'<td>'+durumSel+'</td></tr>';
    }
    var oran=karneOranHesap(r.hedef,r.gerceklesen);

    return '<tr>'+labelCell

      +'<td>'+durumSel+'</td></tr>';
  }).join('');
  return '<div class="tablewrap" style="max-height:none"><table class="karne-table">'
    +'<thead><tr><th style="text-align:left">Performans Metriği</th><th>Aylık Hedef</th><th>Gerçekleşen</th><th>Başarı Oranı</th><th>Şube/Takım Ort.</th><th>Durum</th></tr></thead>'
    +'<tbody>'+trs+'</tbody></table></div>';

function karneOkuFormdan(){
  var rows=[];
  document.querySelectorAll('.karne-table tbody tr').forEach(function(tr){
    var hedefEl=tr.querySelector('[data-fld="hedef"]'), gercEl=tr.querySelector('[data-fld="gerceklesen"]'),
        ortEl=tr.querySelector('[data-fld="subeOrt"]'), durumEl=tr.querySelector('[data-fld="durum"]');
    var key=(durumEl||hedefEl).dataset.drow;
    rows.push({key:key,
      hedef:hedefEl&&hedefEl.value!==''?+hedefEl.value:null,
      gerceklesen:gercEl&&gercEl.value!==''?+gercEl.value:null,

      durum:durumEl?durumEl.value:''});

function karneKaydet(kesinlestir){
  var msg=document.getElementById('karneMsg');
  var kendiUser=WORK.users.find(u=>u.kullanici===SES.kullanici);
  var marka=kendiUser&&kendiUser.marka;
  var yilEl=document.getElementById('kYil'), ayEl=document.getElementById('kAy'), danEl=document.getElementById('kDan');
  if(!marka||!yilEl||!ayEl||!danEl||!danEl.value){if(msg)msg.innerHTML='<div class="err-msg">Dönem/Danışman bulunamadı.</div>';return;}
  var yil=+yilEl.value, ay=+ayEl.value, dan=danEl.value;
  var rows=karneOkuFormdan();
  var plan=(document.getElementById('kPlan')||{}).value||'';
  if(kesinlestir&&!plan.trim()){if(msg)msg.innerHTML='<div class="err-msg">"Yönetici Değerlendirmesi ve Gelişim Aksiyon Planı" alanı boş bırakılamaz.</div>';return;}
  if(kesinlestir&&rows.some(r=>!r.durum)){if(msg)msg.innerHTML='<div class="err-msg">Tüm metrikler için Durum seçilmelidir.</div>';return;}
  var existing=karneBul(yil,ay,marka,dan), now=new Date().toISOString();
  if(existing&&existing.ciktiTarihi){if(msg)msg.innerHTML='<div class="err-msg">Bu karnenin çıktısı alındı, artık düzenlenemez.</div>';return;}
  if(!existing){
    existing={id:'k'+Date.now().toString(36)+Math.random().toString(36).slice(2,7),yil:yil,ay:ay,marka:marka,danisman:dan,
      yoneticiKullanici:SES.kullanici,yoneticiAd:SES.ad,olusturma:now,kesinlesmeTarihi:null,ciktiTarihi:null,log:[]};
    WORK.karneler.push(existing);
  }
  existing.log=existing.log||[];
  var oncekiDurum=existing.durum;
  existing.metrikler=rows; existing.gelisimPlani=plan; existing.guncelleme=now;
  existing.durum=kesinlestir?'kesinlesen':'taslak';
  if(kesinlestir&&oncekiDurum!=='kesinlesen'){existing.kesinlesmeTarihi=now;existing.log.push({tarih:now,olay:'kesinlestirildi',kullanici:SES.ad});}
  else if(kesinlestir){existing.log.push({tarih:now,olay:'revize_edildi',kullanici:SES.ad});}
  else existing.log.push({tarih:now,olay:'taslak_kaydedildi',kullanici:SES.ad});
  VERI.karneler=WORK.karneler;
  karneSaveLocal();
  if(msg)msg.innerHTML='<div class="ok-msg">✓ '+(kesinlestir?'Kesinleştirildi':'Taslak kaydedildi')+' — bu tarayıcıda kayıtlı.</div>';
  render();
  /* Ortak veri.js dosyası daha önce (Yönetim > veri.js İndir > "Doğrudan kaydet") bir kez
     bağlandıysa sessizce oraya da yazılır; bağlanmadıysa hiçbir pencere/istek açılmaz. */
  saveVeriJsDirect(false).then(function(ok){
    if(!ok)return;
    var m=document.getElementById('karneMsg'); if(!m)return;
    m.innerHTML='<div class="ok-msg">✓ '+(kesinlestir?'Kesinleştirildi':'Taslak kaydedildi')+' — bu tarayıcıda kayıtlı ve ortak veri.js dosyasına da yazıldı.</div>';
  });
}

   +'<div class="note">Yukarıda "Yetersiz" işaretlenen metriklerin kök nedenlerini, saha gözlemlerini ve gelişim/eğitim aksiyonlarını somut biçimde yazın. Boş bırakılamaz.</div>'
   +'<textarea id="kPlan" rows="5"'+(kilitli?' disabled':'')+'>'+esc(existing?existing.gelisimPlani||'':'')+'</textarea>'

function karneMudurGecmis(marka){

function karneDurumMatrisi(){
  var yil=DIM.yillar.length?DIM.yillar[DIM.yillar.length-1]:new Date().getFullYear();
  var rows='';
  DIM.markalar.forEach(function(marka){
    var roster=karneRoster(marka);
    if(!roster.length)return;
    rows+='<tr class="dg-marka-row"><td colspan="13">'+esc(marka)+'</td></tr>';
    roster.forEach(function(dan){
      var cells='';
      for(var ay=1;ay<=12;ay++){
        var k=karneBul(yil,ay,marka,dan);
        var cls,icon,durumTxt;
        if(!k){cls='dg-yok';icon='–';durumTxt='Henüz girilmedi';}
        else if(k.durum==='kesinlesen'){cls='dg-kesin';icon='✓';durumTxt='Kesinleşti'+(k.ciktiTarihi?' (çıktı alındı)':'');}
        else{cls='dg-taslak';icon='✎';durumTxt='Taslak halinde';}
        cells+='<td class="dg-cell '+cls+'" data-tip="'+esc(dan)+' — '+AYLAR[ay-1]+' '+yil+': <b>'+esc(durumTxt)+'</b>"><span>'+icon+'</span></td>';
      }
      rows+='<tr><td class="dg-dan">'+esc(dan)+'</td>'+cells+'</tr>';
    });
  });
  if(!rows)return '';
  var head='<th style="text-align:left">Marka / Danışman</th>'+AYLAR.map(a=>'<th>'+a.slice(0,3)+'</th>').join('');
  var legend='<div class="karne-legend">'
    +'<span><span class="dg-cell dg-yok"><span>–</span></span> Girilmedi</span>'
    +'<span><span class="dg-cell dg-taslak"><span>✎</span></span> Taslak</span>'
    +'<span><span class="dg-cell dg-kesin"><span>✓</span></span> Kesinleşti</span>'
    +'</div>';
  return '<div class="card"><h3>Karne Hazırlanma Durumu</h3>'
    +'<div class="csub">'+yil+' — marka ve danışman bazında hangi ayların karnesi girilmiş/kesinleşmiş.</div>'
    +legend
    +'<div class="tablewrap" style="max-height:420px"><table class="durum-grid"><thead><tr>'+head+'</tr></thead><tbody>'+rows+'</tbody></table></div>'
    +'</div>';
}

      +'</div>'
      +'<div style="display:flex;align-items:center;gap:10px;flex-shrink:0">'

      +'<span class="caret">▶</span></div></div>';
    var itemBody=isOpen?('<div class="karne-item-body">'
      +karneTableHtml(k.metrikler||[],true,false)

    return '<div class="karne-item'+(isOpen?' open':'')+'">'+itemHead+itemBody+'</div>';
  }).join('');
  return matris+head+cards;

function karneDashboardHtml(opts){
  var fixedMarka=opts.marka;
  var effMarka=fixedMarka!=null?fixedMarka:karneDashFlt.marka;
  var markaSelHtml=fixedMarka!=null
    ? '<div class="fld"><label>Marka</label><input value="'+esc(fixedMarka)+'" disabled></div>'
    : '<div class="fld"><label>Marka</label><select id="kdMarka"><option value="">Tüm Markalar</option>'
      +DIM.markalar.map(m=>'<option value="'+esc(m)+'"'+(karneDashFlt.marka===m?' selected':'')+'>'+esc(m)+'</option>').join('')+'</select></div>';
  var kesinlesenler=(WORK.karneler||[]).filter(k=>k.durum==='kesinlesen'&&(!effMarka||k.marka===effMarka));
  var danListe=[...new Set(kesinlesenler.map(k=>k.danisman))].sort((a,b)=>a.localeCompare(b,'tr'));
  var danSelHtml='<div class="fld"><label>Danışman (opsiyonel — boşsa marka ortalaması)</label>'
    +'<select id="kdDan"><option value="">— Marka Ortalaması —</option>'
    +danListe.map(d=>'<option value="'+esc(d)+'"'+(karneDashFlt.danisman===d?' selected':'')+'>'+esc(d)+'</option>').join('')+'</select></div>';
  var metrikSelHtml='<div class="fld"><label>Performans Metriği</label><select id="kdMetrik">'
    +KARNE_METRIKLER.map(m=>'<option value="'+m.key+'"'+(karneDashFlt.metrik===m.key?' selected':'')+'>'+esc(m.ad)+'</option>').join('')+'</select></div>';
  var head='<div class="card"><h3>Performans Dashboard</h3><div class="csub">Yalnızca <b>kesinleşen</b> karnelere göre hesaplanır (taslaklar dahil değildir). Seçili metriğin marka veya danışman bazında zaman içindeki değişimini gösterir.</div>'
    +'<div class="karne-dash-filters">'+markaSelHtml+danSelHtml+metrikSelHtml+'</div></div>';

  var filtered=(WORK.karneler||[]).filter(function(k){
    if(k.durum!=='kesinlesen')return false;
    if(effMarka&&k.marka!==effMarka)return false;
    if(karneDashFlt.danisman&&k.danisman!==karneDashFlt.danisman)return false;
    return true;
  });
  if(!filtered.length)return head+'<div class="empty">Bu filtrelerle kesinleşmiş karne bulunamadı.</div>';

  var metrikDef=KARNE_METRIKLER.find(m=>m.key===karneDashFlt.metrik)||KARNE_METRIKLER[0];
  var donemSet={};
  filtered.forEach(function(k){donemSet[k.yil+'-'+(k.ay<10?'0'+k.ay:k.ay)]=true;});
  var donemler=Object.keys(donemSet).sort();
  var cats=donemler.map(function(d){var p=d.split('-');return AYLAR[+p[1]-1].slice(0,3)+' '+p[0];});

  var chartHtml, tablo='';
  if(metrikDef.tip==='ozel'){
    var counts={'Başarılı':[],'Yetersiz':[],'Etkisi Yok':[]};
    donemler.forEach(function(d){
      var p=d.split('-'),yil=+p[0],ay=+p[1];
      var recs=filtered.filter(k=>k.yil===yil&&k.ay===ay);
      var c={'Başarılı':0,'Yetersiz':0,'Etkisi Yok':0};
      recs.forEach(function(k){
        var row=(k.metrikler||[]).find(r=>r.key===metrikDef.key);
        if(row&&c.hasOwnProperty(row.durum))c[row.durum]++;
      });
      Object.keys(counts).forEach(function(key){counts[key].push(c[key]);});
    });
    chartHtml=groupedBar(cats,[
      {name:'Başarılı',color:'var(--ok)',values:counts['Başarılı']},
      {name:'Yetersiz',color:'var(--bad)',values:counts['Yetersiz']},
      {name:'Etkisi Yok',color:'var(--muted)',values:counts['Etkisi Yok']}
    ],{h:300,w:1200});
  }else{
    var hedefS=[],gercS=[];
    donemler.forEach(function(d){
      var p=d.split('-'),yil=+p[0],ay=+p[1];
      var recs=filtered.filter(k=>k.yil===yil&&k.ay===ay);
      var hs=[],gs=[];
      recs.forEach(function(k){
        var row=(k.metrikler||[]).find(r=>r.key===metrikDef.key);
        if(row){if(row.hedef!=null)hs.push(row.hedef); if(row.gerceklesen!=null)gs.push(row.gerceklesen);}
      });
      hedefS.push(hs.length?Math.round((hs.reduce((a,b)=>a+b,0)/hs.length)*10)/10:0);
      gercS.push(gs.length?Math.round((gs.reduce((a,b)=>a+b,0)/gs.length)*10)/10:0);
    });
    chartHtml=lineChart(cats,[
      {name:'Aylık Hedef',color:'var(--s-hedef)',values:hedefS},
      {name:'Gerçekleşen',color:'var(--s-fiili)',values:gercS}
    ],{h:300,w:1200});
    var tabloSatirlar=donemler.map(function(d){
      var p=d.split('-'),yil=+p[0],ay=+p[1];
      var recs=filtered.filter(k=>k.yil===yil&&k.ay===ay);
      var hs=[],gs=[];
      recs.forEach(function(k){var row=(k.metrikler||[]).find(r=>r.key===metrikDef.key);
        if(row){if(row.hedef!=null)hs.push(row.hedef); if(row.gerceklesen!=null)gs.push(row.gerceklesen);}});
      var hOrt=hs.length?Math.round((hs.reduce((a,b)=>a+b,0)/hs.length)*10)/10:null;
      var gOrt=gs.length?Math.round((gs.reduce((a,b)=>a+b,0)/gs.length)*10)/10:null;
      var oran=karneOranHesap(hOrt,gOrt);
      return '<tr><td style="text-align:left">'+AYLAR[ay-1]+' '+yil+'</td><td>'+recs.length+'</td>'
        +'<td>'+(hOrt==null?'—':hOrt)+'</td><td>'+(gOrt==null?'—':gOrt)+'</td>'
        +'<td>'+(oran==null?'—':(Math.round(oran*1000)/10)+'%')+'</td></tr>';
    }).join('');
    tablo='<div class="tablewrap" style="max-height:none;margin-top:14px"><table>'
      +'<thead><tr><th style="text-align:left">Dönem</th><th>Karne Sayısı</th><th>Ort. Hedef</th><th>Ort. Gerçekleşen</th><th>Ort. Başarı Oranı</th></tr></thead>'
      +'<tbody>'+tabloSatirlar+'</tbody></table></div>';
  }
  var baslik=esc(metrikDef.ad)+(karneDashFlt.danisman?(' — '+esc(karneDashFlt.danisman)):(effMarka?(' — '+esc(effMarka)+' Ortalaması'):' — Tüm Şirket Ortalaması'));
  return head+'<div class="card"><h3>'+baslik+'</h3>'+chartHtml+tablo+'</div>';
}

  var ayOpts='<option value="">Tüm Aylar</option>'+AYLAR.map((a,i)=>'<option value="'+(i+1)+'"'+((''+karneAdminFlt.ay)===(''+(i+1))?' selected':'')+'>'+a+'</option>').join('');

function karneExportRows(){
  var list=(WORK.karneler||[]).filter(function(k){
    if(karneAdminFlt.marka&&k.marka!==karneAdminFlt.marka)return false;
    if(karneAdminFlt.ay&&k.ay!==+karneAdminFlt.ay)return false;
    if(karneAdminFlt.durum&&k.durum!==karneAdminFlt.durum)return false;
    return true;
  });
  var rows=[];
  list.forEach(function(k){
    (k.metrikler||[]).forEach(function(r){
      var m=KARNE_METRIKLER.find(x=>x.key===r.key)||{ad:r.key};
      var oran=karneOranHesap(r.hedef,r.gerceklesen);
      rows.push({
        marka:k.marka, yil:k.yil, ay:AYLAR[k.ay-1], danisman:k.danisman, yonetici:k.yoneticiAd||'',
        metrik:m.ad, hedef:r.hedef==null?'':r.hedef, gerceklesen:r.gerceklesen==null?'':r.gerceklesen,
        subeOrt:r.subeOrt==null?'':r.subeOrt, oran:oran==null?'':(Math.round(oran*1000)/10),
        metrikDurum:r.durum||'', karneDurum:karneDurumMap[k.durum]||k.durum,
        kesinlesme:k.kesinlesmeTarihi?fmtTarih(k.kesinlesmeTarihi):'', cikti:k.ciktiTarihi?fmtTarih(k.ciktiTarihi):'',
        plan:k.gelisimPlani||''

  return rows;
}

function karneDndAfterElement(container,y){
  var els=[...container.querySelectorAll('.dnd-item:not(.dragging)')];
  var closest={off:-Infinity,el:null};
  els.forEach(function(child){
    var box=child.getBoundingClientRect(), offset=y-box.top-box.height/2;
    if(offset<0&&offset>closest.off){closest={off:offset,el:child};}
  });
  return closest.el;
}
function bindKarneDnd(){
  var availList=document.getElementById('dndAvailList'), selList=document.getElementById('dndSelList');
  if(!availList||!selList)return;
  document.querySelectorAll('.dnd-item').forEach(function(li){
    li.ondragstart=function(e){dndDragKey=li.dataset.field; li.classList.add('dragging'); try{e.dataTransfer.effectAllowed='move';}catch(_){}};
    li.ondragend=function(){li.classList.remove('dragging');};
  });
  [availList,selList].forEach(function(list){
    var box=list.closest('.dnd-box');
    list.ondragover=function(e){e.preventDefault(); box.classList.add('over');};
    list.ondragleave=function(){box.classList.remove('over');};
    list.ondrop=function(e){
      e.preventDefault(); box.classList.remove('over');
      if(!dndDragKey)return;
      var isSelList=(list.id==='dndSelList');
      karneExportSel=karneExportSel.filter(k=>k!==dndDragKey);
      if(isSelList){
        var afterEl=karneDndAfterElement(list,e.clientY);
        var idx=afterEl?[...list.children].indexOf(afterEl):karneExportSel.length;
        karneExportSel.splice(idx,0,dndDragKey);
      }
      dndDragKey=null;
      render();
    };
  });
}
